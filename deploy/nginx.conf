# Nginx reverse proxy for Dynastica (Next.js running under PM2 on 127.0.0.1:3000).
#
# Install path: /etc/nginx/sites-available/dynastica
# Enable with:  ln -s /etc/nginx/sites-available/dynastica /etc/nginx/sites-enabled/
# Test + reload: nginx -t && systemctl reload nginx
#
# Replace dynastica.example.com with your real domain before reloading.

# Long-lived upstream so PM2 worker churn doesn't reopen sockets per request.
upstream dynasty_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ---------- HTTP → HTTPS redirect ----------
# If you're terminating TLS at an external load balancer (Oracle LB, CDN, etc.),
# delete this block and the HTTPS server below; keep only a single server block
# listening on :80 with the location rules.
server {
    listen 80;
    listen [::]:80;
    server_name dynastica.example.com;

    # ACME http-01 challenges (Certbot writes here during issuance/renewal).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS server ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dynastica.example.com;

    # --- TLS (managed by Certbot) ---
    # Run once on the server:
    #   sudo certbot --nginx -d dynastica.example.com
    # Certbot will rewrite the lines below to point at its issued cert paths.
    ssl_certificate     /etc/letsencrypt/live/dynastica.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dynastica.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers (sane defaults; tune if you embed third-party widgets) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # --- Compression ---
    # Brotli is preferable but requires nginx-extras / ngx_brotli. gzip is enough
    # to cut HTML/JSON payloads ~70% and is built in.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # --- Reasonable upload limit (search forms, future API). Bump if you add uploads. ---
    client_max_body_size 2m;

    # --- Hashed Next.js static assets: immutable + 1y cache ---
    # Filenames are content-hashed by Next, so they can be cached forever.
    location /_next/static/ {
        proxy_pass http://dynasty_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # --- /public assets (favicon, og images, robots.txt etc.) ---
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml|.*\.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff2?|ttf))$ {
        proxy_pass http://dynasty_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # --- Image-optimization endpoint ---
    # Next's /_next/image responses are cacheable; let Nginx hold them in
    # memory between requests.
    location /_next/image {
        proxy_pass http://dynasty_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # --- App routes (HTML, RSC payloads, API) ---
    location / {
        proxy_pass http://dynasty_app;
        proxy_http_version 1.1;

        # Standard reverse-proxy headers so Next sees the original client.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (harmless in prod; future-proofs streaming features).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Reuse upstream connections.
        proxy_set_header Connection "";

        # Reasonable timeouts — long enough for cold prerender, short enough
        # not to wedge a worker on a runaway request.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_redirect off;
    }

    # Hide the upstream's Server: header.
    proxy_hide_header X-Powered-By;
}
